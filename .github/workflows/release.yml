name: Release

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish crates.io package and GitHub Release"
        required: true
        type: boolean
        default: false
  push:
    tags:
      - "v*.*.*"

jobs:
  release-preflight:
    if: github.event_name == 'push' || inputs.publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check publish ref
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.ref_type }}" != "tag" ]]; then
            echo "Manual publishing must run from a tag ref" >&2
            exit 1
          fi
      - name: Check crates.io token configured
        shell: bash
        env:
          CRATES_IO_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          if [[ -z "$CRATES_IO_TOKEN" ]]; then
            echo "CRATES_IO_TOKEN repository secret is required for release publishing" >&2
            exit 1
          fi
      - name: Check crates.io package publishability
        env:
          CRATES_IO_OWNER_LOGIN: ${{ vars.CRATES_IO_OWNER_LOGIN }}
        run: scripts/check-crates-io-release-ready.py

  verify:
    needs: release-preflight
    if: always() && (needs.release-preflight.result == 'success' || needs.release-preflight.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.75.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --locked --test cli_surface --test cli_sync_search --test cli_inspect_compare_aggregate --test cli_remaining_commands --test cli_flag_parity --test cli_path_overrides --test cli_goldens
      - run: ./xtask regen-golden
      - run: git diff --exit-code -- tests/golden
      - run: scripts/check-parity-checklist.sh
      - run: scripts/check-crate-roots.py
      - run: scripts/check-local-only.py
      - run: scripts/check-no-production-unwrap.py
      - run: scripts/make-test-fixtures.py
      - run: git diff --exit-code -- tests/fixtures/transcripts
      - run: scripts/check-fixtures-scrubbed.py
      - run: scripts/check-release-workflow.py
      - run: scripts/check-ci-workflow.py
      - run: scripts/test-crates-io-release-ready.py
      - run: scripts/test-github-release-assets.py
      - run: scripts/test-release-complete.py
      - run: cargo rustdoc --lib --locked -- -D missing_docs
      - run: cargo test --doc --locked
      - run: cargo package --locked
      - run: scripts/check-install-smoke.sh
      - name: Check release tag metadata
        shell: bash
        run: |
          manifest_version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
            test "$manifest_version" = "$version"
          else
            version="$manifest_version"
          fi
          grep -q "^## ${manifest_version}$" CHANGELOG.md
          git fetch origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main

  build:
    needs: verify
    if: always() && needs.verify.result == 'success'
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            linux_cross_linker: ""
            can_run: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            linux_cross_linker: aarch64-linux-gnu-gcc
            can_run: false
          - os: macos-latest
            target: x86_64-apple-darwin
            linux_cross_linker: ""
            can_run: false
          - os: macos-latest
            target: aarch64-apple-darwin
            linux_cross_linker: ""
            can_run: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            linux_cross_linker: ""
            can_run: true
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.75.0
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux cross linker
        if: matrix.linux_cross_linker != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=${{ matrix.linux_cross_linker }}" >> "$GITHUB_ENV"
      - name: Build reproducible artifact
        shell: bash
        run: |
          if [[ "${{ matrix.target }}" == *"-pc-windows-msvc" ]]; then
            export RUSTFLAGS="-C link-arg=/Brepro -C link-arg=/PDBALTPATH:%_PDB%"
          fi
          CARGO_TARGET_DIR=target/repro-a cargo build --release --locked --target ${{ matrix.target }}
          CARGO_TARGET_DIR=target/repro-b cargo build --release --locked --target ${{ matrix.target }}
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            bin="spotter.exe"
          else
            bin="spotter"
          fi
          cmp "target/repro-a/${{ matrix.target }}/release/$bin" "target/repro-b/${{ matrix.target }}/release/$bin"
      - name: Check binary version
        shell: bash
        if: matrix.can_run
        run: |
          version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)"
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            output="$(target/repro-a/${{ matrix.target }}/release/spotter.exe --version)"
          else
            output="$(target/repro-a/${{ matrix.target }}/release/spotter --version)"
          fi
          test "$output" = "spotter $version"
      - name: Package binary
        shell: bash
        run: |
          mkdir -p dist
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp target/repro-a/${{ matrix.target }}/release/spotter.exe dist/spotter-${{ matrix.target }}.exe
            sha256sum dist/spotter-${{ matrix.target }}.exe > dist/spotter-${{ matrix.target }}.sha256
          else
            cp target/repro-a/${{ matrix.target }}/release/spotter dist/spotter-${{ matrix.target }}
            shasum -a 256 dist/spotter-${{ matrix.target }} > dist/spotter-${{ matrix.target }}.sha256
          fi
      - uses: actions/upload-artifact@v7
        with:
          name: spotter-${{ matrix.target }}
          path: dist/*

  publish:
    needs: build
    if: github.event_name == 'push' || inputs.publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.75.0
      - run: cargo publish --locked --token "$CRATES_IO_TOKEN"
        env:
          CRATES_IO_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
      - uses: softprops/action-gh-release@v3
        with:
          files: dist/*
